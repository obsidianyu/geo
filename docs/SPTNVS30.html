<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>耐震設計規範 Vs30 計算器</title>
  
  <!-- 引入 Tailwind CSS 進行排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 讓瀏覽器可以讀懂 JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 font-sans text-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- 定義圖示元件 (取代原本的 lucide-react) ---
    const IconPlus = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    );
    const IconTrash2 = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
    );
    const IconCalculator = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>
    );
    const IconInfo = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
    );
    const IconSettings = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    );
    const IconAlertTriangle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    );
    const IconLayers = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
    );
    const IconMapPin = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
    );
    // -----------------------------------------------------------

    const Formulas = {
      JRA: {
        id: 'jra',
        name: '日本道路協會 JRA',
        desc: '砂性土: Vs = 80 × N^(1/3) | 黏性土: Vs = 100 × N^(1/3)'
      },
      IMAI: {
        id: 'imai',
        name: 'Imai & Tonouchi (1982)',
        desc: '所有土質: Vs = 97 × N^0.314'
      },
      OHTA: {
        id: 'ohta',
        name: 'Ohta & Goto (1978) 簡化版',
        desc: '所有土質: Vs = 85.35 × N^0.348'
      }
    };

    const SoilTypes = {
      SAND: { id: 'sand', name: '砂性土 (包含砂、礫石)', color: 'bg-yellow-200', border: 'border-yellow-400' },
      CLAY: { id: 'clay', name: '黏性土 (包含黏土、粉土)', color: 'bg-orange-200', border: 'border-orange-400' }
    };

    function Vs30Calculator() {
      const [layers, setLayers] = useState([
        { id: 1, thickness: '5.0', type: 'sand', nValue: '10' },
        { id: 2, thickness: '12.0', type: 'clay', nValue: '8' },
        { id: 3, thickness: '15.0', type: 'sand', nValue: '30' }
      ]);
      const [formulaId, setFormulaId] = useState(Formulas.JRA.id);

      // 計算每層的 Vs
      const calculateVs = (type, nValueStr) => {
        let n = parseFloat(nValueStr);
        if (isNaN(n) || n <= 0) n = 1;

        switch (formulaId) {
          case Formulas.JRA.id:
            return type === 'sand' ? 80 * Math.pow(n, 1 / 3) : 100 * Math.pow(n, 1 / 3);
          case Formulas.IMAI.id:
            return 97 * Math.pow(n, 0.314);
          case Formulas.OHTA.id:
            return 85.35 * Math.pow(n, 0.348);
          default:
            return 100;
        }
      };

      // 即時計算結果
      const results = useMemo(() => {
        let currentDepth = 0;
        let sumDoverV = 0;
        let sumDoverN = 0;
        let effectiveDepth = 0;
        let processedLayers = [];

        for (let layer of layers) {
          let d = parseFloat(layer.thickness) || 0;
          let n = parseFloat(layer.nValue) || 1;
          let type = layer.type;
          let v = calculateVs(type, n);
          let isCut = false;

          // 如果累加深度超過 30m，只取到 30m 為止的厚度
          if (currentDepth + d > 30) {
            d = 30 - currentDepth;
            isCut = true;
          }

          if (d > 0) {
            sumDoverV += d / v;
            sumDoverN += d / n;
            effectiveDepth += d;
            processedLayers.push({
              ...layer,
              effectiveD: d,
              vs: v,
              startDepth: currentDepth,
              endDepth: currentDepth + d
            });
          }

          currentDepth += (parseFloat(layer.thickness) || 0);
          if (currentDepth >= 30) break;
        }

        const vs30 = effectiveDepth > 0 ? (effectiveDepth / sumDoverV) : 0;
        const nBar = effectiveDepth > 0 ? (effectiveDepth / sumDoverN) : 0;
        const totalInputDepth = layers.reduce((sum, l) => sum + (parseFloat(l.thickness) || 0), 0);

        // 耐震規範地盤分類
        let siteClass = "";
        let siteDesc = "";
        if (vs30 > 1500) { siteClass = "第一類"; siteDesc = "堅硬岩盤"; }
        else if (vs30 > 760) { siteClass = "第二類"; siteDesc = "岩盤"; }
        else if (vs30 > 360) { siteClass = "第三類"; siteDesc = "緻密土層或軟岩"; }
        else if (vs30 >= 180) { siteClass = "第四類"; siteDesc = "堅實土層"; }
        else if (vs30 > 0) { siteClass = "第五類"; siteDesc = "軟弱土層"; }
        else { siteClass = "-"; siteDesc = "資料不足"; }

        return { vs30, nBar, effectiveDepth, totalInputDepth, siteClass, siteDesc, processedLayers };
      }, [layers, formulaId]);

      const addLayer = () => {
        const newId = layers.length > 0 ? Math.max(...layers.map(l => l.id)) + 1 : 1;
        setLayers([...layers, { id: newId, thickness: '5.0', type: 'sand', nValue: '10' }]);
      };

      const removeLayer = (id) => {
        if (layers.length > 1) {
          setLayers(layers.filter(l => l.id !== id));
        }
      };

      const updateLayer = (id, field, value) => {
        setLayers(layers.map(l => (l.id === id ? { ...l, [field]: value } : l)));
      };

      return (
        <div className="min-h-screen p-4 md:p-8">
          <div className="max-w-6xl mx-auto space-y-6">
            
            {/* Header */}
            <div className="bg-white rounded-2xl shadow-sm p-6 flex items-center justify-between border border-slate-200">
              <div>
                <h1 className="text-2xl md:text-3xl font-bold text-blue-900 flex items-center gap-3">
                  <IconCalculator className="text-blue-600" size={32} />
                  耐震設計規範 V<sub>s30</sub> 計算工具
                </h1>
                <p className="text-slate-500 mt-2">根據 SPT-N 值換算剪力波速，自動計算前 30 公尺平均波速並判定地盤分類。</p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              {/* 左側：輸入區 */}
              <div className="lg:col-span-2 space-y-6">
                
                {/* 設定區 */}
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                    <IconSettings size={20} className="text-slate-600" />
                    計算設定 (經驗公式)
                  </h2>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    {Object.values(Formulas).map(form => (
                      <div 
                        key={form.id}
                        onClick={() => setFormulaId(form.id)}
                        className={`cursor-pointer border-2 rounded-xl p-4 transition-all ${
                          formulaId === form.id 
                          ? 'border-blue-500 bg-blue-50/50' 
                          : 'border-slate-200 hover:border-blue-300'
                        }`}
                      >
                        <div className="font-medium text-slate-800">{form.name}</div>
                        <div className="text-xs text-slate-500 mt-2">{form.desc}</div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 地層輸入表 */}
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-semibold flex items-center gap-2">
                      <IconLayers size={20} className="text-slate-600" />
                      地層資料輸入
                    </h2>
                    <button 
                      onClick={addLayer}
                      className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors"
                    >
                      <IconPlus size={16} /> 新增地層
                    </button>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-100/50 text-slate-600 text-sm border-y border-slate-200">
                          <th className="p-3 font-medium">層次</th>
                          <th className="p-3 font-medium">厚度 di (m)</th>
                          <th className="p-3 font-medium">土壤類別</th>
                          <th className="p-3 font-medium">SPT-N 值</th>
                          <th className="p-3 font-medium text-center">操作</th>
                        </tr>
                      </thead>
                      <tbody>
                        {layers.map((layer, index) => (
                          <tr key={layer.id} className="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
                            <td className="p-3 text-slate-500 font-medium">#{index + 1}</td>
                            <td className="p-3">
                              <input 
                                type="number" 
                                min="0.1"
                                step="0.1"
                                value={layer.thickness}
                                onChange={(e) => updateLayer(layer.id, 'thickness', e.target.value)}
                                className="w-24 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                              />
                            </td>
                            <td className="p-3">
                              <select 
                                value={layer.type}
                                onChange={(e) => updateLayer(layer.id, 'type', e.target.value)}
                                className="w-full min-w-[120px] p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                              >
                                {Object.values(SoilTypes).map(t => (
                                  <option key={t.id} value={t.id}>{t.name}</option>
                                ))}
                              </select>
                            </td>
                            <td className="p-3">
                              <input 
                                type="number" 
                                min="1"
                                value={layer.nValue}
                                onChange={(e) => updateLayer(layer.id, 'nValue', e.target.value)}
                                className="w-24 p-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none"
                              />
                            </td>
                            <td className="p-3 text-center">
                              <button 
                                onClick={() => removeLayer(layer.id)}
                                disabled={layers.length <= 1}
                                className="text-slate-400 hover:text-red-500 disabled:opacity-30 transition-colors p-2"
                                title="刪除此層"
                              >
                                <IconTrash2 size={18} />
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  
                  {results.totalInputDepth < 30 && (
                    <div className="mt-4 p-3 bg-amber-50 text-amber-800 rounded-lg flex items-center gap-2 text-sm border border-amber-200">
                      <IconAlertTriangle size={16} />
                      目前總輸入深度為 {results.totalInputDepth.toFixed(1)}m。若不足 30m，結果將為 V<sub>s{Math.floor(results.totalInputDepth)}</sub> 之估計值。
                    </div>
                  )}
                </div>

                {/* 法規說明區塊 */}
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-slate-800">
                    <IconInfo size={20} className="text-blue-500" />
                    地盤分類波速分級依據 (111年版耐震規範)
                  </h2>
                  <div className="text-sm text-slate-600 space-y-2">
                    <p>依據內政部《建築物耐震設計規範及解說》(111年版)，全面改以地表下 30 公尺之平均剪力波速 (V<sub>s30</sub>) 作為地盤分類判定指標：</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2 mt-3 p-4 bg-slate-50 rounded-xl border border-slate-100">
                      <ul className="space-y-2">
                        <li className="flex items-start gap-2">
                          <div className="w-2 h-2 rounded-full bg-blue-500 mt-1.5"></div>
                          <div><span className="font-medium text-slate-700">第一類地盤 (堅硬岩盤)</span><br/><span className="text-xs text-slate-500">V<sub>s30</sub> &gt; 1500 m/s</span></div>
                        </li>
                        <li className="flex items-start gap-2">
                          <div className="w-2 h-2 rounded-full bg-indigo-500 mt-1.5"></div>
                          <div><span className="font-medium text-slate-700">第二類地盤 (岩盤)</span><br/><span className="text-xs text-slate-500">760 m/s &lt; V<sub>s30</sub> &le; 1500 m/s</span></div>
                        </li>
                        <li className="flex items-start gap-2">
                          <div className="w-2 h-2 rounded-full bg-teal-500 mt-1.5"></div>
                          <div><span className="font-medium text-slate-700">第三類地盤 (緻密土層或軟岩)</span><br/><span className="text-xs text-slate-500">360 m/s &lt; V<sub>s30</sub> &le; 760 m/s</span></div>
                        </li>
                      </ul>
                      <ul className="space-y-2">
                        <li className="flex items-start gap-2">
                          <div className="w-2 h-2 rounded-full bg-amber-500 mt-1.5"></div>
                          <div><span className="font-medium text-slate-700">第四類地盤 (堅實土層)</span><br/><span className="text-xs text-slate-500">180 m/s &le; V<sub>s30</sub> &le; 360 m/s</span></div>
                        </li>
                        <li className="flex items-start gap-2">
                          <div className="w-2 h-2 rounded-full bg-red-500 mt-1.5"></div>
                          <div><span className="font-medium text-slate-700">第五類地盤 (軟弱土層)</span><br/><span className="text-xs text-slate-500">V<sub>s30</sub> &lt; 180 m/s</span></div>
                        </li>
                      </ul>
                    </div>
                  </div>
                </div>

              </div>

              {/* 右側：結果與視覺化 */}
              <div className="space-y-6">
                
                {/* 計算結果卡片 */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="bg-blue-900 p-5 text-white">
                    <h2 className="text-lg font-semibold flex items-center gap-2">
                      <IconMapPin size={20} className="text-blue-300" />
                      分析結果
                    </h2>
                  </div>
                  
                  <div className="p-6 space-y-6">
                    <div className="text-center">
                      <div className="text-sm text-slate-500 mb-1">平均剪力波速 V<sub>s30</sub></div>
                      <div className="text-4xl font-bold text-slate-800">
                        {results.vs30.toFixed(1)} <span className="text-lg font-normal text-slate-500">m/s</span>
                      </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4 border-t border-slate-100 pt-6">
                      <div>
                        <div className="text-xs text-slate-500 mb-1">平均 N 值 (N̄)</div>
                        <div className="text-xl font-semibold text-slate-700">{results.nBar.toFixed(1)}</div>
                      </div>
                      <div>
                        <div className="text-xs text-slate-500 mb-1">有效計算深度</div>
                        <div className="text-xl font-semibold text-slate-700">{results.effectiveDepth.toFixed(1)} m</div>
                      </div>
                    </div>

                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                      <div className="text-xs text-slate-500 mb-1">建築物耐震規範地盤分類</div>
                      <div className="text-xl font-bold text-blue-700">
                        {results.siteClass} <span className="text-sm font-medium text-slate-600 ml-1">({results.siteDesc})</span>
                      </div>
                    </div>
                  </div>
                </div>

                {/* 視覺化剖面 */}
                <div className="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                  <h2 className="text-lg font-semibold mb-4 text-slate-800">地層剖面圖 (Top 30m)</h2>
                  <div className="flex">
                    {/* 深度尺規 */}
                    <div className="w-12 border-r border-slate-300 flex flex-col items-end pr-2 py-2 text-xs text-slate-400 relative" style={{ height: '300px' }}>
                      <span className="absolute top-0 right-2">0m</span>
                      <span className="absolute top-1/3 right-2">10m</span>
                      <span className="absolute top-2/3 right-2">20m</span>
                      <span className="absolute bottom-0 right-2">30m</span>
                    </div>
                    
                    {/* 地層方塊 */}
                    <div className="flex-1 ml-4 relative bg-slate-100 rounded-sm overflow-hidden" style={{ height: '300px' }}>
                      {results.processedLayers.map((layer, idx) => {
                        const topPercent = (layer.startDepth / 30) * 100;
                        const heightPercent = (layer.effectiveD / 30) * 100;
                        const styleClass = SoilTypes[layer.type.toUpperCase()].color;
                        const borderClass = SoilTypes[layer.type.toUpperCase()].border;
                        
                        return (
                          <div 
                            key={idx}
                            className={`absolute w-full left-0 ${styleClass} border-b ${borderClass} flex items-center justify-center group transition-all hover:opacity-90`}
                            style={{ top: `${topPercent}%`, height: `${heightPercent}%` }}
                          >
                            {heightPercent > 8 && (
                              <span className="text-xs font-medium text-slate-700/70 select-none">
                                N={layer.nValue} (V<sub>s</sub>={Math.round(layer.vs)})
                              </span>
                            )}
                            
                            {/* Tooltip */}
                            <div className="absolute hidden group-hover:block bg-slate-800 text-white text-xs p-2 rounded -translate-y-full top-0 z-10 shadow-lg whitespace-nowrap">
                              深度: {layer.startDepth.toFixed(1)}m ~ {layer.endDepth.toFixed(1)}m<br/>
                              厚度: {layer.effectiveD.toFixed(1)}m<br/>
                              N值: {layer.nValue}<br/>
                              推算Vs: {layer.vs.toFixed(1)} m/s
                            </div>
                          </div>
                        );
                      })}
                      {/* 超過 30m 的截斷虛線指示 */}
                      {results.totalInputDepth > 30 && (
                        <div className="absolute bottom-0 w-full border-t-2 border-red-500 border-dashed z-20"></div>
                      )}
                    </div>
                  </div>
                  <div className="flex gap-4 mt-4 text-xs justify-center">
                    <div className="flex items-center gap-1"><div className="w-3 h-3 bg-yellow-200 border border-yellow-400"></div>砂性土</div>
                    <div className="flex items-center gap-1"><div className="w-3 h-3 bg-orange-200 border border-orange-400"></div>黏性土</div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Vs30Calculator />);
  </script>
</body>
</html>
